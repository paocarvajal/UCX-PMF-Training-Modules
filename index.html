<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCX PMF Training Module</title>
    <!-- Mantenemos la tipografía corporativa exigida en MASTER_PMO_RULES.md -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* =========================================================================
           LOOK & FEEL CONFIGURATION
           =========================================================================
           Brand: Corporate Premium (Pepsico / Enterprise Agnostic)
           Primary HEX: #0A369D (Deep Trust Blue)
           Secondary HEX: #0078D4 (Action Blue)
           Accent HEX: #10B981 (Success Green)
           Background: #F8FAFC (Slate Light)
           Typography: Inter / Segoe UI (Clean, scalable)
           "The Anti-Crayon Rule" Applied natively.
        ========================================================================= */

        :root {
            --primary: #0A369D;
            --secondary: #0078D4;
            --success: #10B981;
            --text-dark: #0F172A;
            --text-muted: #64748B;
            --bg-body: #F8FAFC;
            --bg-card: #FFFFFF;
            --border: #E2E8F0;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', sans-serif;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-dark);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* SIDEBAR NAVIGATION */
        .sidebar {
            width: 320px;
            background-color: var(--bg-card);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 10;
        }

        .sidebar-header {
            padding: 24px;
            border-bottom: 1px solid var(--border);
        }

        .course-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
        }

        .module-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--primary);
        }

        .progress-container {
            margin-top: 16px;
        }

        .progress-text {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .progress-bar-bg {
            height: 6px;
            background-color: var(--border);
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background-color: var(--success);
            border-radius: 4px;
            transition: width 0.5s ease-in-out;
        }

        .nav-list {
            flex: 1;
            overflow-y: auto;
            padding: 16px 0;
        }

        .nav-item {
            display: flex;
            align-items: flex-start;
            padding: 16px 24px;
            cursor: pointer;
            transition: all 0.2s;
            border-left: 3px solid transparent;
            gap: 16px;
        }

        .nav-item:hover {
            background-color: #F1F5F9;
        }

        .nav-item.active {
            background-color: #EFF6FF;
            border-left-color: var(--secondary);
        }

        .nav-icon {
            margin-top: 2px;
            color: var(--text-muted);
        }

        .nav-item.completed .nav-icon {
            color: var(--success);
        }

        .nav-item.active .nav-icon {
            color: var(--secondary);
        }

        .nav-content-stacked h4 {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 4px;
        }

        .nav-content-stacked p {
            font-size: 12px;
            color: var(--text-muted);
        }

        /* MAIN CONTENT AREA */
        .main-content {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            scroll-behavior: smooth;
        }

        .content-header {
            padding: 32px 48px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: var(--bg-card);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 5;
        }

        .breadcrumb {
            font-size: 13px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .breadcrumb span {
            font-weight: 500;
        }

        .content-wrapper {
            max-width: 900px;
            margin: 0 auto;
            padding: 48px;
            width: 100%;
        }

        /* 1 INSIGHTFUL TITLE (Anti-Crayon Rule) */
        .lesson-header {
            margin-bottom: 32px;
        }

        .lesson-title {
            font-size: 32px;
            font-weight: 700;
            color: var(--primary);
            line-height: 1.2;
            margin-bottom: 12px;
        }

        .lesson-subtitle {
            font-size: 18px;
            color: var(--text-muted);
            font-weight: 400;
        }

        /* 1 VISUAL ANCHOR */
        .visual-anchor {
            width: 100%;
            height: 480px;
            background: linear-gradient(135deg, #1E293B 0%, #0F172A 100%);
            border-radius: 12px;
            box-shadow: var(--shadow-lg);
            margin-bottom: 40px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .visual-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: radial-gradient(circle at top right, rgba(0, 120, 212, 0.2), transparent);
        }

        .play-button {
            width: 80px;
            height: 80px;
            background-color: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 2;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .play-button:hover {
            transform: scale(1.1);
            background-color: rgba(255, 255, 255, 0.2);
        }

        .play-button i[data-lucide] {
            color: white;
            width: 32px;
            height: 32px;
            margin-left: 4px;
        }

        .duration-badge {
            position: absolute;
            bottom: 24px;
            right: 24px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            z-index: 2;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* 3-5 MECE BULLET POINTS */
        .mece-section {
            background-color: var(--bg-card);
            padding: 32px;
            border-radius: 12px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
        }

        .mece-title {
            font-size: 16px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 24px;
        }

        .mece-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .mece-item {
            display: flex;
            gap: 16px;
            align-items: flex-start;
        }

        .bullet-icon {
            background-color: #EFF6FF;
            color: var(--secondary);
            padding: 8px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .mece-content h5 {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 4px;
        }

        .mece-content p {
            font-size: 14px;
            color: var(--text-muted);
            line-height: 1.6;
        }

        /* ACTION FOOTER */
        .lesson-footer {
            margin-top: 48px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 32px;
            border-top: 1px solid var(--border);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }

        .btn-outline {
            background-color: transparent;
            border: 1px solid var(--border);
            color: var(--text-dark);
        }

        .btn-outline:hover {
            background-color: var(--bg-body);
        }

        .btn-primary {
            background-color: var(--secondary);
            color: white;
            box-shadow: 0 4px 12px rgba(0, 120, 212, 0.2);
        }

        .btn-primary:hover {
            background-color: #0066B4;
            transform: translateY(-1px);
        }

        .btn-success {
            background-color: var(--success);
            color: white;
        }

    </style>
</head>
<body>

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="course-title" id="course-name">Cargando...</div>
            <h2 class="module-title" id="course-topic">Cargando...</h2>
            
            <div class="progress-container">
                <div class="progress-text">
                    <span>Progreso del Curso</span>
                    <span id="progress-percentage">0%</span>
                </div>
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="progress-bar"></div>
                </div>
            </div>
        </div>

        <div class="nav-list" id="nav-list-container">
            <!-- Cargado por JS -->
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">
        <header class="content-header">
            <div class="breadcrumb">
                <span id="header-topic">Dashboard</span>
                <i data-lucide="chevron-right" width="14" height="14"></i>
                <span style="color: var(--secondary);" id="header-module-name">Cargando...</span>
            </div>
        </header>

        <div class="content-wrapper">
            <!-- 1 INSIGHTFUL TITLE -->
            <div class="lesson-header">
                <h1 class="lesson-title" id="content-title">Cargando...</h1>
                <p class="lesson-subtitle" id="content-subtitle">Por favor espera.</p>
            </div>

            <!-- 1 VISUAL ANCHOR -->
            <div class="visual-anchor">
                <div class="visual-overlay"></div>
                <div class="play-button">
                    <i data-lucide="play"></i>
                </div>
                <div class="duration-badge">
                    <i data-lucide="clock" width="14" height="14"></i> <span id="visual-timer">15:00</span>
                </div>
            </div>

            <!-- 3-5 MECE BULLET POINTS -->
            <div class="mece-section">
                <h3 class="mece-title">Key Takeaways (Mandatorios)</h3>
                <ul class="mece-list" id="bullet-points-container">
                    <!-- Cargado por JS -->
                </ul>
            </div>

            <!-- ACTION FOOTER -->
            <div class="lesson-footer">
                <button class="btn btn-outline" id="prev-btn" onclick="prevModule()">
                    <i data-lucide="arrow-left" width="18" height="18"></i> Lección Anterior
                </button>
                <button class="btn btn-primary" id="complete-btn" onclick="completeModule()">
                    Marcar como Completado <i data-lucide="check" width="18" height="18"></i>
                </button>
            </div>
        </div>
    </main>

    <script>
        /* =========================================================================================
           MANUAL TO POWER: EDITA TU INFORMACIÓN AQUÍ (Data Layer)
           Instrucciones: Simplemente copia el texto de Confluence y pégalo entre las comillas. 
           No necesitas tocar el HTML de arriba. Solo cambia este bloque "COURSE_DATA".
           ========================================================================================= */

        const COURSE_DATA = {
            courseName: "External Deployment Academy",
            courseTopic: "UCX PMF Training Module",
            modules: [
                {
                    id: 1,
                    sidebarName: "1. Introducción al Core",
                    time: "10 min",
                    title: "Bienvenidos a UCX PMF",
                    subtitle: "Entorno inicial y alineación de arquitecturas.",
                    bullets: [
                        { title: "Manejo de Matrices", desc: "Cómo acceder al PMF Alignment para seguimiento de Stakeholders." },
                        { title: "Ejecutivo vs Técnico", desc: "El flujo de cambio: Desde la aprobación del Director hasta el backlog técnico." }
                    ]
                },
                {
                    id: 2,
                    sidebarName: "2. Gestión de Entregables (RAI)",
                    time: "15 min",
                    title: "RAI Log",
                    subtitle: "El estándar 'Responsible, Action, Item' implementado en PMF.",
                    bullets: [
                        { title: "Registro Único", desc: "Copiar todos los riesgos desde PENDING_LOG maestro. Nada en paralelo." },
                        { title: "Asignación Estricta", desc: "El PM responsable debe asegurar que cada item tenga un Owner definido." }
                    ]
                }
            ]
        };

        /* =========================================================================================
           MOTOR LÓGICO (NO TOCAR SI NO ERES DEVELOPER)
           ========================================================================================= */
        
        // Initialize Icons
        lucide.createIcons();

        let currentModuleIndex = 0;
        let completedModules = Array(COURSE_DATA.modules.length).fill(false);

        function initCourse() {
            document.getElementById('course-name').innerText = COURSE_DATA.courseName;
            document.getElementById('course-topic').innerText = COURSE_DATA.courseTopic;
            document.getElementById('header-topic').innerText = COURSE_DATA.courseTopic;
            renderSidebar();
            loadModule(0);
        }

        function renderSidebar() {
            const container = document.getElementById('nav-list-container');
            container.innerHTML = '';
            
            COURSE_DATA.modules.forEach((mod, index) => {
                let statusClass = "locked";
                let icon = "lock";
                let statusText = "Bloqueado";

                if (completedModules[index]) {
                    statusClass = "completed";
                    icon = "check-circle";
                    statusText = "Completado";
                } else if (index === currentModuleIndex) {
                    statusClass = "active";
                    icon = "play-circle";
                    statusText = "En Progreso";
                } else if (index > 0 && completedModules[index - 1]) {
                    statusClass = "";
                    icon = "play";
                    statusText = "Disponible";
                }

                if (index === 0 && !completedModules[0] && currentModuleIndex !== 0) {
                     statusClass = "";
                     icon = "play";
                     statusText = "Disponible";
                }

                const item = document.createElement('div');
                item.className = `nav-item ${statusClass}`;
                item.onclick = () => { if (index <= getHighestUnlocked()) loadModule(index); };
                
                item.innerHTML = `
                    <i data-lucide="${icon}" class="nav-icon"></i>
                    <div class="nav-content-stacked">
                        <h4>${mod.sidebarName}</h4>
                        <p>${mod.time} • ${statusText}</p>
                    </div>
                `;
                container.appendChild(item);
            });
            lucide.createIcons();
            updateProgress();
        }

        function getHighestUnlocked() {
            let num = 0;
            for(let i=0; i<completedModules.length; i++) {
                if(completedModules[i]) num = i+1;
            }
            return num >= COURSE_DATA.modules.length ? COURSE_DATA.modules.length -1 : num;
        }

        function loadModule(index) {
            currentModuleIndex = index;
            const data = COURSE_DATA.modules[index];
            
            document.getElementById('header-module-name').innerText = data.sidebarName;
            document.getElementById('content-title').innerText = data.title;
            document.getElementById('content-subtitle').innerText = data.subtitle;
            document.getElementById('visual-timer').innerText = data.time;

            const bulletContainer = document.getElementById('bullet-points-container');
            bulletContainer.innerHTML = '';
            data.bullets.forEach(b => {
                const li = document.createElement('li');
                li.className = "mece-item";
                li.innerHTML = `
                    <div class="bullet-icon"><i data-lucide="target" width="20" height="20"></i></div>
                    <div class="mece-content">
                        <h5>${b.title}</h5>
                        <p>${b.desc}</p>
                    </div>
                `;
                bulletContainer.appendChild(li);
            });

            const completeBtn = document.getElementById('complete-btn');
            if (completedModules[index]) {
                completeBtn.classList.remove('btn-primary');
                completeBtn.style.backgroundColor = 'var(--success)';
                completeBtn.style.color = 'white';
                completeBtn.innerHTML = '¡Módulo Completado! <i data-lucide="check-circle" width="18" height="18"></i>';
            } else {
                completeBtn.removeAttribute("style");
                completeBtn.className = 'btn btn-primary';
                completeBtn.style.backgroundColor = 'var(--secondary)';
                completeBtn.style.color = 'white';
                completeBtn.innerHTML = 'Marcar como Completado <i data-lucide="check" width="18" height="18"></i>';
            }

            document.getElementById('prev-btn').style.opacity = index === 0 ? "0" : "1";
            
            renderSidebar();
        }

        function completeModule() {
            completedModules[currentModuleIndex] = true;
            if (currentModuleIndex < COURSE_DATA.modules.length - 1) {
                currentModuleIndex++;
            }
            loadModule(currentModuleIndex);
        }

        function prevModule() {
            if (currentModuleIndex > 0) loadModule(currentModuleIndex - 1);
        }

        function updateProgress() {
            const total = completedModules.length;
            const completed = completedModules.filter(c => c).length;
            const percentage = Math.round((completed / total) * 100);
            
            document.getElementById('progress-percentage').innerText = percentage + "%";
            document.getElementById('progress-bar').style.width = percentage + "%";
        }

        initCourse();
    </script>
</body>
</html>
